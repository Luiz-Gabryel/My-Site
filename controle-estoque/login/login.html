<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Login</title>
</head>
<body>

    <div class="card">
        <h2>Login</h2>
        <p>Entre com sua conta para continuar.</p>

        <form>
            <div>
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" name="usuario" placeholder="Seu nome de usuário" required>
            </div>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
            </div>

            <a class="esqueci" href="../esqueci-senha/esqueci.html">Esqueci minha senha</a>

           <button type="button" onclick="location.href='../pagina-inicial/pagina-inicial.html'">Entrar</button>
        </form>

        <a class="voltar" href="../index.html">← Voltar</a>
    </div>

</body>
</html>
