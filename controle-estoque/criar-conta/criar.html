<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Criar Conta</title>
</head>
<body>

    <div class="card">
        <h2>Criar Conta</h2>
        <p>Preencha os dados abaixo para se cadastrar.</p>

        <form>
            <div>
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" name="usuario" placeholder="Seu nome de usuário" required>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
            </div>

            <button type="button" onclick="location.href='../pagina-inicial/pagina-inicial.html'">Criar Conta</button>
        </form>

        <a class="voltar" href="../login/login.html">Voltar para o login</a>
    </div>

</body>
</html>
